name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  monorepo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm build
      # Tests run once packages define them; `turbo run test` no-ops on packages without a test script.
      - run: pnpm test

  prototype:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prototype/package-lock.json
      - run: npm ci
      - run: npm run build

  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ -q

  # P0 DB verification (docs/10 §2.4): local Supabase on the runner (Docker is free here),
  # apply migrations 0000–0007 + seed, then run the cross-tenant RLS denial proof.
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase db start
      - run: supabase db reset
      - name: RLS proof (seed counts + cross-tenant denial)
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/gate/p0_rls_check.sql
